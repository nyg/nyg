name: generate-readme

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: latest
          run_install: true

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2 # v1
        with:
          card: stats
          options: show_icons=true&include_all_commits=true&show=discussions_started,discussions_answered,prs_merged
          path: assets/cards/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2 # v1
        with:
          card: top-langs
          options: layout=compact
          path: assets/cards/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate README.md
        run: |
          pnpm generate
        env:
          # note: GITHUB_TOKEN doesn't seem to work due to permissions
          USER_TOKEN: ${{ secrets.USER_TOKEN }}

      - name: Commit changes if any
        # https://github.com/actions/checkout/pull/1184
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/cards
          git commit -m "Update README.md and cards" || exit 0
          git push
